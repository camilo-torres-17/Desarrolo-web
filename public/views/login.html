<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<title>Login Admin</title>
</head>

<body>

<header>
    <div class="cabecera">
        <a href="/">
            <img class="imgcabecera" src="/images/inicio/logo.png" alt="Algoritmos Preciosos">
        </a>
        <div class="titulo">
            <h1>ALGORITMOS PRECIOSOS</h1>

        </div>
        <div class="carrito-header">
            <a href="/carrito">
                <i class="fas fa-shopping-cart"></i>
                <span>Carrito</span>
                <span id="contador-carrito">0</span>
            </a>
        </div>
    </div>
</header>

<main>
    <section style="text-align: center;">
        <h2 style="text-align:center;">🔐 Login Administrador</h2>

        <div style="max-width:300px; margin:30px auto;">
            
            <input id="usuario" type="text" placeholder="Usuario" style="width:100%; margin:10px 0; padding:8px;">
            
            <input id="password" type="password" placeholder="Contraseña" style="width:100%; margin:10px 0; padding:8px;">
            
            <button type="button" onclick="login()" style="width:100%; padding:10px; background:#4dc1f2; color:white; border:none; border-radius:6px;">
                Ingresar
            </button>

        </div>
    </section>
</main>

<script src="/js/login.js"></script>
<script src="/js/carrito.js"></script>
<script src="/js/subscribe.js"></script>

<footer>
    <section>
        <div>
            <h2>Contactanos</h2>
            <h4>info@algoritmospreciosos.com</h4>
            <h4>3123164110</h4>
            <h4>Cl. 12 #8-2 a 8-84</h4>
            <h4>Sangil, Santander, Colombia</h4>
        </div>
        <div>

            <h4>Cambios y devoluciones</h4>

    </section>
